name: Publish to npm

on:
  push:
    tags:
      - "v*"
      - "cli-v*"
      - "cache-v*"
      - "auth-v*"
      - "rate-limit-v*"

jobs:
  publish-core:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: cd cli && pnpm run build

      - name: Ensure package exists in registry
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer $NPM_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"@varbyte/nest-worker-cli","access":"public"}' \
            https://registry.npmjs.org/@varbyte%2fnest-worker-cli || true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: cd cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Ecosystem Packages ──────────────────────────────────────────────

  publish-ecosystem:
    if: >-
      startsWith(github.ref, 'refs/tags/cache-v') ||
      startsWith(github.ref, 'refs/tags/auth-v') ||
      startsWith(github.ref, 'refs/tags/rate-limit-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - tagPrefix: cache-v
            dir: packages/cache
            name: "@varbyte/nest-worker-cache"
          - tagPrefix: auth-v
            dir: packages/auth
            name: "@varbyte/nest-worker-auth"
          - tagPrefix: rate-limit-v
            dir: packages/rate-limit
            name: "@varbyte/nest-worker-rate-limit"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm run build

      - name: Build package
        run: cd ${{ matrix.dir }} && pnpm run build

      - name: Ensure package exists in registry
        run: |
          PACKAGE_NAME="${{ matrix.name }}"
          curl -s -X PUT \
            -H "Authorization: Bearer $NPM_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${PACKAGE_NAME}\",\"access\":\"public\"}" \
            "https://registry.npmjs.org/$(echo ${PACKAGE_NAME} | sed 's|/|%2F|g')" || true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: cd ${{ matrix.dir }} && pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
