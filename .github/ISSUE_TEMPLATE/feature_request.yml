name: 💡 Feature Request
description: Suggest an idea for nest-worker
labels: [type:feature, status:needs-review]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please check the [roadmap](https://github.com/varbyte-dev/nest-worker/blob/master/ROADMAP.md) and existing issues first.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe what you're trying to solve
      placeholder: "I'm frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear description of what you want to happen
      placeholder: "Add a @Scheduled() decorator that..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, code snippets, or references
      render: typescript
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      multiple: true
      options:
        - Core (DI, Modules, Lifecycle)
        - CLI
        - D1 Integration
        - Middlewares
        - Swagger / OpenAPI
        - Documentation
        - Other
  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I have searched the existing issues and roadmap and this is not a duplicate
          required: true
